name: Deploy to Hostinger (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Inject the Anthropic key into the build so the PHP proxy can use it.
      # Only runs if the ANTHROPIC_API_KEY repo secret is set; otherwise the
      # app stays on its offline fallback dictionary. The key is never committed
      # and GitHub masks it in logs.
      - name: Inject Anthropic key
        if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: printf "<?php\nreturn '%s';\n" "$ANTHROPIC_API_KEY" > dist/config.local.php

      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # Give the FTPS control socket longer to connect (Hostinger can be
          # slow to answer; the 30s default was timing out).
          timeout: 120000
          # Upload the production build only.
          local-dir: ./dist/
          server-dir: /public_html/mydutchwords/
