name: Deploy to Hostinger (Manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Optional cloud sync (accounts + saved progress). Baked into the
          # static bundle at build time — see docs/auth-setup.md. Leaving
          # these secrets unset still produces a working, fully offline build.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # Give the FTPS control socket longer to connect (Hostinger can be
          # slow to answer; the 30s default was timing out).
          timeout: 1200
          # Upload the production build only.
          local-dir: ./dist/
          server-dir: /public_html/mydutchwords/
